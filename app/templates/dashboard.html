<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus PCM - Manutenção Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0B1121; color: #FFFFFF; }
        
        .bg-primary { background: #0B1121; }
        .bg-card { background: #0F172A; }
        .bg-hover { background: #1E2A4A; }
        .text-primary-blue { color: #2563EB; }
        .text-secondary-blue { color: #60A5FA; }
        .text-purple { color: #8B5CF6; }
        .text-pink { color: #EC4899; }
        .border-primary { border-color: #1E2A4A; }
        
        .gradient-text {
            background: linear-gradient(135deg, #60A5FA 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .card {
            background: #0F172A;
            border: 1px solid #1E2A4A;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .card:hover { border-color: #2563EB; transform: translateY(-4px); }
        
        .btn-primary {
            background: linear-gradient(135deg, #2563EB 0%, #8B5CF6 100%);
            color: white; font-weight: 600; padding: 10px 24px; border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        
        .sidebar {
            background: #0F172A;
            border-right: 1px solid #1E2A4A;
            transition: all 0.3s ease;
        }
        
        .nav-item {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-item:hover { background: #1E2A4A; color: #60A5FA; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(139, 91, 246, 0.2));
            border-left: 3px solid #2563EB;
            color: #60A5FA;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0F172A;
            border: 1px solid #1E2A4A;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 32px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-spinner {
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-radius: 50%;
            border-top: 3px solid #2563EB;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1E2A4A;
            border-left: 4px solid #2563EB;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-primary">

    <div class="flex h-screen">
        
        <!-- Sidebar -->
        <aside class="sidebar w-72 flex-shrink-0 overflow-y-auto fixed h-full z-20">
            <div class="p-6 border-b border-primary">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#2563EB] to-[#8B5CF6] flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl text-white">NEXUS</h1>
                        <p class="text-xs text-secondary-blue">PCM - Manutenção</p>
                    </div>
                </div>
            </div>
            
            <nav class="p-4 space-y-2">
                <div onclick="loadPage('dashboard')" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer">
                    <i class="fas fa-tachometer-alt w-5"></i>
                    <span>Dashboard</span>
                </div>
                <div onclick="loadPage('assets')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer">
                    <i class="fas fa-microchip w-5"></i>
                    <span>Ativos</span>
                </div>
                <div onclick="loadPage('work-orders')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer">
                    <i class="fas fa-clipboard-list w-5"></i>
                    <span>Ordens de Serviço</span>
                </div>
                <div onclick="loadPage('metrics')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>Indicadores</span>
                </div>
                <div onclick="loadPage('settings')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer">
                    <i class="fas fa-cog w-5"></i>
                    <span>Configurações</span>
                </div>
            </nav>
            
            <div class="absolute bottom-0 w-72 p-4 border-t border-primary">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#8B5CF6] to-[#EC4899] flex items-center justify-center">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div>
                        <p class="text-sm font-semibold" id="userName">Administrador</p>
                        <p class="text-xs text-gray-400" id="userEmail">admin@nexus.com</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 ml-72 overflow-y-auto">
            
            <!-- Header -->
            <header class="sticky top-0 z-10 bg-primary/80 backdrop-blur-md border-b border-primary px-8 py-4">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold gradient-text" id="pageTitle">Dashboard</h1>
                        <p class="text-sm text-gray-400" id="pageSubtitle">Visão geral do sistema de manutenção</p>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <button onclick="openModal('newAsset')" class="btn-primary text-sm px-4 py-2">
                            <i class="fas fa-plus mr-2"></i> Novo Ativo
                        </button>
                        <button onclick="openModal('newWorkOrder')" class="bg-[#1E2A4A] hover:bg-[#2A3A60] text-white px-4 py-2 rounded-lg transition text-sm">
                            <i class="fas fa-clipboard-list mr-2"></i> Nova OS
                        </button>
                    </div>
                </div>
            </header>
            
            <!-- Content Area -->
            <div id="contentArea" class="p-8">
                <div class="loading-spinner"></div>
            </div>
            
            <!-- Footer -->
            <div class="text-center py-6 border-t border-primary">
                <p class="text-xs text-gray-500">© 2024 Nexus PCM - Sistema de Manutenção Industrial | R$ 397/mês</p>
            </div>
        </main>
    </div>

    <!-- Modal Novo Ativo -->
    <div id="newAssetModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Novo Ativo</h2>
                <button onclick="closeModal('newAssetModal')" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <form id="assetForm">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Código</label>
                    <input type="text" id="assetCode" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Nome</label>
                    <input type="text" id="assetName" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Tipo</label>
                    <select id="assetType" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white">
                        <option value="equipment">Equipamento</option>
                        <option value="machine">Máquina</option>
                        <option value="vehicle">Veículo</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Localização</label>
                    <input type="text" id="assetLocation" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white">
                </div>
                <button type="submit" class="w-full btn-primary py-2">Criar Ativo</button>
            </form>
        </div>
    </div>

    <!-- Modal Nova OS -->
    <div id="newWorkOrderModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Nova Ordem de Serviço</h2>
                <button onclick="closeModal('newWorkOrderModal')" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <form id="workOrderForm">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Código</label>
                    <input type="text" id="woCode" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Ativo</label>
                    <select id="woAssetId" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white" required></select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Título</label>
                    <input type="text" id="woTitle" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Tipo</label>
                    <select id="woType" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white">
                        <option value="corrective">Corretiva</option>
                        <option value="preventive">Preventiva</option>
                        <option value="predictive">Preditiva</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Prioridade</label>
                    <select id="woPriority" class="w-full bg-[#1E2A4A] border border-[#2A3A60] rounded-lg px-4 py-2 text-white">
                        <option value="1">1 - Baixa</option>
                        <option value="2">2 - Normal</option>
                        <option value="3">3 - Média</option>
                        <option value="4">4 - Alta</option>
                        <option value="5">5 - Urgente</option>
                    </select>
                </div>
                <button type="submit" class="w-full btn-primary py-2">Criar OS</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('token');
        
        async function autoLogin() {
            if (!token) {
                try {
                    const response = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: 'admin', password: 'admin123' })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        token = data.access_token;
                        localStorage.setItem('token', token);
                    }
                } catch(e) { console.log('Auto login error'); }
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function openModal(modalId) {
            document.getElementById(modalId + 'Modal').style.display = 'flex';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        async function loadAssetsForSelect() {
            const response = await fetch(`${API_BASE}/assets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const assets = await response.json();
                const select = document.getElementById('woAssetId');
                select.innerHTML = assets.map(a => `<option value="${a.id}">${a.code} - ${a.name}</option>`).join('');
            }
        }
        
        async function loadDashboard() {
            document.getElementById('pageTitle').innerHTML = 'Dashboard';
            document.getElementById('pageSubtitle').innerHTML = 'Visão geral do sistema de manutenção';
            
            const response = await fetch(`${API_BASE}/metrics/summary`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const metrics = await response.json();
            
            const assetsResponse = await fetch(`${API_BASE}/assets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const assets = await assetsResponse.json();
            
            const woResponse = await fetch(`${API_BASE}/work-orders`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const workOrders = await woResponse.json();
            
            document.getElementById('contentArea').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="card p-5">
                        <div class="flex justify-between items-start">
                            <div><p class="text-gray-400 text-sm">Ativos Totais</p><p class="text-3xl font-bold mt-2">${metrics.total_assets || 0}</p></div>
                            <i class="fas fa-microchip text-3xl text-secondary-blue"></i>
                        </div>
                    </div>
                    <div class="card p-5">
                        <div class="flex justify-between items-start">
                            <div><p class="text-gray-400 text-sm">OS Abertas</p><p class="text-3xl font-bold mt-2">${metrics.open_orders || 0}</p></div>
                            <i class="fas fa-clipboard-list text-3xl text-purple"></i>
                        </div>
                    </div>
                    <div class="card p-5">
                        <div class="flex justify-between items-start">
                            <div><p class="text-gray-400 text-sm">MTBF Médio</p><p class="text-3xl font-bold mt-2">${metrics.avg_mtbf || 0}<span class="text-sm">h</span></p></div>
                            <i class="fas fa-chart-line text-3xl text-pink"></i>
                        </div>
                    </div>
                    <div class="card p-5">
                        <div class="flex justify-between items-start">
                            <div><p class="text-gray-400 text-sm">Disponibilidade</p><p class="text-3xl font-bold mt-2">${metrics.availability || 0}<span class="text-sm">%</span></p></div>
                            <i class="fas fa-check-circle text-3xl text-primary-blue"></i>
                        </div>
                    </div>
                </div>
                
                <div class="card p-6 mb-8">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-microchip text-primary-blue mr-2"></i>Ativos</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="text-left text-gray-400 border-b border-primary"><th class="pb-3">Código</th><th class="pb-3">Nome</th><th class="pb-3">Localização</th><th class="pb-3">Status</th></tr></thead>
                            <tbody>${assets.map(a => `<tr class="border-b border-primary"><td class="py-3 text-primary-blue">${a.code}</td><td class="py-3">${a.name}</td><td class="py-3 text-gray-400">${a.location || '-'}</td><td class="py-3"><span class="px-2 py-1 rounded-full text-xs ${a.status === 'active' ? 'bg-green-900/30 text-green-400' : 'bg-yellow-900/30 text-yellow-400'}">${a.status === 'active' ? 'Ativo' : 'Inativo'}</span></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
                
                <div class="card p-6">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-clipboard-list text-purple mr-2"></i>Ordens de Serviço</h2>
                    <div class="space-y-3">
                        ${workOrders.map(wo => `
                            <div class="bg-[#1E2A4A] rounded-lg p-4 flex justify-between items-center">
                                <div><p class="font-semibold">${wo.code}</p><p class="text-sm text-gray-400">${wo.title}</p></div>
                                <div class="text-right"><span class="px-2 py-1 rounded-full text-xs ${wo.status === 'opened' ? 'bg-yellow-900/30 text-yellow-400' : 'bg-green-900/30 text-green-400'}">${wo.status === 'opened' ? 'Aberta' : 'Concluída'}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        async function loadAssets() {
            document.getElementById('pageTitle').innerHTML = 'Ativos';
            document.getElementById('pageSubtitle').innerHTML = 'Gestão de ativos industriais';
            
            const response = await fetch(`${API_BASE}/assets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const assets = await response.json();
            
            document.getElementById('contentArea').innerHTML = `
                <div class="card p-6">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="text-left text-gray-400 border-b border-primary"><th class="pb-3">Código</th><th class="pb-3">Nome</th><th class="pb-3">Tipo</th><th class="pb-3">Localização</th><th class="pb-3">Horas</th><th class="pb-3">Falhas</th><th class="pb-3">Status</th></tr></thead>
                            <tbody>${assets.map(a => `<tr class="border-b border-primary"><td class="py-3 text-primary-blue">${a.code}</td><td class="py-3">${a.name}</td><td class="py-3 text-gray-400">${a.asset_type}</td><td class="py-3 text-gray-400">${a.location || '-'}</td><td class="py-3">${a.total_operating_hours || 0}</td><td class="py-3">${a.failure_count || 0}</td><td class="py-3"><span class="px-2 py-1 rounded-full text-xs ${a.status === 'active' ? 'bg-green-900/30 text-green-400' : 'bg-yellow-900/30 text-yellow-400'}">${a.status === 'active' ? 'Ativo' : 'Inativo'}</span></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        async function loadWorkOrders() {
            document.getElementById('pageTitle').innerHTML = 'Ordens de Serviço';
            document.getElementById('pageSubtitle').innerHTML = 'Gestão de ordens de serviço';
            
            const response = await fetch(`${API_BASE}/work-orders`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const orders = await response.json();
            
            document.getElementById('contentArea').innerHTML = `
                <div class="card p-6">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="text-left text-gray-400 border-b border-primary"><th class="pb-3">Código</th><th class="pb-3">Título</th><th class="pb-3">Tipo</th><th class="pb-3">Prioridade</th><th class="pb-3">Status</th><th class="pb-3">Ações</th></tr></thead>
                            <tbody>${orders.map(o => `<tr class="border-b border-primary"><td class="py-3 text-primary-blue">${o.code}</td><td class="py-3">${o.title}</td><td class="py-3">${o.maintenance_type}</td><td class="py-3">${o.priority}</td><td class="py-3"><span class="px-2 py-1 rounded-full text-xs ${o.status === 'opened' ? 'bg-yellow-900/30 text-yellow-400' : 'bg-green-900/30 text-green-400'}">${o.status}</span></td><td class="py-3"><button onclick="showToast('Em desenvolvimento')" class="text-secondary-blue hover:text-primary-blue"><i class="fas fa-eye"></i></button></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        async function loadMetrics() {
            document.getElementById('pageTitle').innerHTML = 'Indicadores';
            document.getElementById('pageSubtitle').innerHTML = 'MTBF, MTTR e disponibilidade';
            
            const response = await fetch(`${API_BASE}/metrics/summary`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const metrics = await response.json();
            
            const assetsResponse = await fetch(`${API_BASE}/assets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const assets = await assetsResponse.json();
            
            document.getElementById('contentArea').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="card p-6 text-center"><div class="text-4xl font-bold text-secondary-blue mb-2">${metrics.avg_mtbf || 0}</div><div class="text-gray-400">MTBF Médio (horas)</div></div>
                    <div class="card p-6 text-center"><div class="text-4xl font-bold text-purple mb-2">${metrics.avg_mttr || 0}</div><div class="text-gray-400">MTTR Médio (horas)</div></div>
                    <div class="card p-6 text-center"><div class="text-4xl font-bold text-pink mb-2">${metrics.availability || 0}%</div><div class="text-gray-400">Disponibilidade Média</div></div>
                </div>
                
                <div class="card p-6">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-chart-line text-primary-blue mr-2"></i>Detalhamento por Ativo</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="text-left text-gray-400 border-b border-primary"><th class="pb-3">Ativo</th><th class="pb-3">Horas</th><th class="pb-3">Falhas</th><th class="pb-3">MTBF</th></tr></thead>
                            <tbody>${assets.map(a => `
                                <tr class="border-b border-primary">
                                    <td class="py-3">${a.name}</td>
                                    <td class="py-3">${a.total_operating_hours || 0}</td>
                                    <td class="py-3">${a.failure_count || 0}</td>
                                    <td class="py-3">${a.failure_count > 0 ? ((a.total_operating_hours / a.failure_count).toFixed(2)) : 0}h</td>
                                </tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function loadSettings() {
            document.getElementById('pageTitle').innerHTML = 'Configurações';
            document.getElementById('pageSubtitle').innerHTML = 'Configurações do sistema';
            document.getElementById('contentArea').innerHTML = `<div class="card p-6 text-center"><i class="fas fa-cog text-4xl text-gray-400 mb-4"></i><p class="text-gray-400">Configurações em desenvolvimento</p></div>`;
        }
        
        async function loadPage(page) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            if (event && event.currentTarget) event.currentTarget.classList.add('active');
            
            if (page === 'dashboard') await loadDashboard();
            else if (page === 'assets') await loadAssets();
            else if (page === 'work-orders') await loadWorkOrders();
            else if (page === 'metrics') await loadMetrics();
            else if (page === 'settings') loadSettings();
        }
        
        document.getElementById('assetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                code: document.getElementById('assetCode').value,
                name: document.getElementById('assetName').value,
                asset_type: document.getElementById('assetType').value,
                location: document.getElementById('assetLocation').value
            };
            const response = await fetch(`${API_BASE}/assets`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                closeModal('newAssetModal');
                showToast('Ativo criado com sucesso!');
                loadAssets();
                document.getElementById('assetForm').reset();
            } else {
                showToast('Erro ao criar ativo', 'error');
            }
        });
        
        document.getElementById('workOrderForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                code: document.getElementById('woCode').value,
                asset_id: document.getElementById('woAssetId').value,
                title: document.getElementById('woTitle').value,
                maintenance_type: document.getElementById('woType').value,
                priority: parseInt(document.getElementById('woPriority').value)
            };
            const response = await fetch(`${API_BASE}/work-orders`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                closeModal('newWorkOrderModal');
                showToast('OS criada com sucesso!');
                loadWorkOrders();
                document.getElementById('workOrderForm').reset();
            } else {
                showToast('Erro ao criar OS', 'error');
            }
        });
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal(event.target.id);
            }
        };
        
        autoLogin().then(() => {
            loadDashboard();
            loadAssetsForSelect();
        });
    </script>
</body>
</html>
