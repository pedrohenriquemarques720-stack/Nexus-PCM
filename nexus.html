<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Company - Ecossistema de Softwares Industriais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0B1121;
            color: #FFFFFF;
        }
        
        /* Cores baseadas na logo Nexus Company */
        .bg-nexus { background: #0B1121; }
        .bg-nexus-card { background: #0F172A; }
        .bg-nexus-hover { background: #1E2A4A; }
        .text-nexus-blue { color: #2563EB; }
        .text-nexus-light-blue { color: #60A5FA; }
        .text-nexus-purple { color: #8B5CF6; }
        .text-nexus-pink { color: #EC4899; }
        .border-nexus { border-color: #1E2A4A; }
        
        /* Gradientes */
        .gradient-primary {
            background: linear-gradient(135deg, #2563EB 0%, #8B5CF6 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #60A5FA 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Animações */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes glowBlue {
            0%, 100% { box-shadow: 0 0 20px rgba(37, 99, 235, 0.2); }
            50% { box-shadow: 0 0 40px rgba(37, 99, 235, 0.4); }
        }
        
        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        /* Cards */
        .product-card {
            background: #0F172A;
            border: 1px solid #1E2A4A;
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .product-card::before
